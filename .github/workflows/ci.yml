name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repo. Override per-job if a step
# ever needs more (it shouldn't here).
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Fast checks: typecheck the frontend + lint/test the Rust backend on Linux.
  # ---------------------------------------------------------------------------
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Frontend typecheck
        run: npx tsc --noEmit

      - name: Frontend lint
        run: npx eslint .

      - name: Frontend format check
        run: npx prettier --check .

      - name: Frontend tests
        run: npm run test

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

  # ---------------------------------------------------------------------------
  # Cross-platform compile check: ensure the app builds on every OS. We pass
  # --no-bundle so it needs no code-signing key — the signed installers and
  # updater artifacts are produced by release.yml, which has the secrets.
  # (With createUpdaterArtifacts enabled, a full `tauri build` would fail here
  # demanding TAURI_SIGNING_PRIVATE_KEY.)
  # ---------------------------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (tauri, compile-only)
        run: npm run tauri build -- --no-bundle

  # ---------------------------------------------------------------------------
  # Dependency vulnerability audit (advisory DB for crates + npm).
  # Runs independently so it never blocks the build artifacts, but surfaces
  # known CVEs in dependencies as a failed check to triage.
  # ---------------------------------------------------------------------------
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: npm audit (high & critical)
        run: npm audit --audit-level=high

      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit
